repos:
  - repo: local
    hooks:
      - id: mypy-src
        name: mypy
        entry: uv run mypy src/ test/
        language: system
        always_run: true
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format src/ test/
        language: system
        always_run: true
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src/ test/
        language: system
        always_run: true
        pass_filenames: false
